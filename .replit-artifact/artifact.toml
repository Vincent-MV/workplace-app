kind = "web"
previewPath = "/"
title = "Nexus"
version = "1.0.0"
id = "artifacts/nexus"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18245

[services.development]
run = "pnpm --filter @workspace/nexus run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nexus", "run", "build" ]
run = "pnpm --filter @workspace/nexus run start"

[services.env]
PORT = "18245"
